<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <h1>welcome to orion</h1>
    </header>
    <main>
        
        <div class="outerbox">
            <div class="screen">
                
            </div>
            <divc class="buttonarea">
                <!-- special buttons -->
                <div class="specialbutton">
                
                <button type="button" id="special" data value="AR">AR</button>
                <button type="button" id="special" data value="check"><i class="fa-solid fa-check"></i></button>
                <button type="button" id="special" data value="up"><i class="fa-solid fa-sort-up"></i></button>
                <button type="button" id="special" data value="down"><i class="fa-solid fa-sort-down"></i></button>
                </div>

                <!-- first line of buttons -->
                <button type="button" data value="Disp">Disp</button>
                <button type="button" data value="canc">canc</button>
                <button type="button" data value="+/-">+/-</button>
                <button type="button" data value="square-root"><i class="fa-solid fa-square-root-variable"></i></button>
                <button type="button" data value="MU">MU</button>
                <button type="button" data value="GT">GT</button>
                <!-- second line of buttons -->
                <button type="button" data value="7">7</button>
                <button type="button" data value="8">8</button>
                <button type="button" data value="9">9</button>
                <button type="button" data value="%">%</button>
                <button type="button" data value="C">C</button>
                <button type="button" data value="AC">AC</button>
                <!-- third line of buttons-->
                <button type="button" data value="4">4</button>
                <button type="button" data value="5">5</button>
                <button type="button" data value="6">6</button>
                <button type="button" data value="*">X</button>
                <button type="button" data value="/"><i class="fa-solid fa-divide"></i></button>
                <button type="button" data value="MRC">MRC</button>
                <!-- fourth line of buttons -->
                <button type="button" data value="1">1</button>
                <button type="button" data value="2">2</button>
                <button type="button" data value="3">3</button>
                <button type="button" class="addition_special" data value="+">+</button>
                <button type="button" data value="-">-</button>
                <button type="button" data value="M-">M-</button>
                <!-- fifth line of button -->
                <button type="button" data value="0">0</button>
                <button type="button" data value="00">00</button>
                <button type="button" data value=".">.</button>
                <!-- <button type="submit" class="addition_special">+</button> -->
                <button type="button" data value="=">=</button>
                <button type="button" data value="M+">M+</button>




            </div>

        </div>
        

    </main>
    <footer>
        <div class="footnote">
            <h3>Thank you</h3>
        </div>
    </footer>
    
</body>
</html>
