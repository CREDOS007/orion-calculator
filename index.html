<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <h1>welcome to orion</h1>
    </header>
    <main>
        
        <div class="outerbox">
            <div class="screen">
                
            </div>
            <divc class="buttonarea">
                <!-- special buttons -->
                <div class="specialbutton">
                
                <button type="button" id="special" data value="AR">AR</button>
                <button type="button" id="special" data value="check"><i class="fa-solid fa-check"></i></button>
                <button type="button" id="special" data value="up"><i class="fa-solid fa-sort-up"></i></button>
                <button type="button" id="special" data value="down"><i class="fa-solid fa-sort-down"></i></button>
                </div>

                <!-- first line of buttons -->
                <button type="button">Disp</button>
                <button type="button">canc</button>
                <button type="button">+/-</button>
                <button type="button"><i class="fa-solid fa-square-root-variable"></i></button>
                <button type="button">MU</button>
                <button type="button">GT</button>
                <!-- second line of buttons -->
                <button type="button">7</button>
                <button type="button">8</button>
                <button type="button">9</button>
                <button type="button">%</button>
                <button type="button">C</button>
                <button type="button">AC</button>
                <!-- third line of buttons-->
                <button type="button">4</button>
                <button type="button">5</button>
                <button type="button">6</button>
                <button type="button">X</button>
                <button type="button"><i class="fa-solid fa-divide"></i></button>
                <button type="button">MRC</button>
                <!-- fourth line of buttons -->
                <button type="button">1</button>
                <button type="button">2</button>
                <button type="button">3</button>
                <button type="button" class="addition_special">+</button>
                <button type="button">-</button>
                <button type="button">M-</button>
                <!-- fifth line of button -->
                <button type="button">0</button>
                <button type="button">00</button>
                <button type="button">.</button>
                <!-- <button type="submit" class="addition_special">+</button> -->
                <button type="button">=</button>
                <button type="button">M+</button>




            </div>

        </div>
        

    </main>
    
</body>
</html>
